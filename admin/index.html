<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Traffic Admin Panel</title>

<!-- STYLE TRANG CHÍNH -->
<link rel="stylesheet" href="../style.css">

<!-- STYLE ADMIN -->
<link rel="stylesheet" href="admin.css">

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>🚦 Báo cáo người dùng</h2>

        <!-- hiển thị email admin -->
        <div id="adminInfo"></div>

        <button onclick="logout()">Logout</button>

        <hr>

        <div id="reportList"></div>

    </div>

    <!-- MAP -->
    <div id="map"></div>

    <div id="imgModal" class="img-modal" onclick="closeImage()">
    <img id="imgPreview">
</div>

</div>

<script>

const supabaseUrl = "https://sweqvobmlntyhyeuurfr.supabase.co";
const supabaseKey = "sb_publishable_xsqRVFRoQSh0c9wzwc5vxA_Hw9aj9fF";

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function checkLogin(){

    const { data: { session } } = await supabaseClient.auth.getSession();

    if(!session){
        window.location.href = "login.html";
        return;
    }

    // hiển thị email admin
    document.getElementById("adminInfo").innerHTML =
        "Admin: " + session.user.email;

    // chỉ khi login thành công mới load admin.js
    const script = document.createElement("script");
    script.src = "admin.js";
    document.body.appendChild(script);

}

async function logout(){

    await supabaseClient.auth.signOut();
    window.location.href = "login.html";

}

checkLogin();

</script>

</body>

</html>
